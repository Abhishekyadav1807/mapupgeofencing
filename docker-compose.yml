services:
  geofencing-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_PATH=/data/geofencing.db
    volumes:
      - geofencing-data:/data
    restart: unless-stopped

  geofencing-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080/ws/alerts
    depends_on:
      - geofencing-api
    restart: unless-stopped

volumes:
  geofencing-data:
